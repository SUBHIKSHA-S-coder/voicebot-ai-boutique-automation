<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastram - AI Voice Bot Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f23;
  --surface: #1a1a2e;
  --surface-light: #25253f;
  --border: #2d2d44;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.2);
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 3rem;
  padding: 1.5rem;
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
  border-radius: 20px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -10%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  animation: pulse-glow 4s ease-in-out infinite;
}

@keyframes pulse-glow {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}

.brand {
  display: flex;
  align-items: center;
  gap: 1rem;
  position: relative;
  z-index: 1;
}

.brand-icon {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 8px 32px var(--accent-glow);
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.brand-text h1 {
  font-family: 'Outfit', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(90deg, #fff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.02em;
}

.brand-text p {
  font-size: 0.875rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  background: rgba(16,185,129,0.1);
  border: 1px solid rgba(16,185,129,0.3);
  border-radius: 50px;
  color: var(--success);
  font-size: 0.875rem;
  font-weight: 600;
  position: relative;
  z-index: 1;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--success);
  border-radius: 50%;
  animation: blink 2s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* STATS GRID */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1.5rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}

.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.3);
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--gradient);
}

.stat-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

.stat-value {
  font-family: 'Outfit', sans-serif;
  font-size: 2.5rem;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 0.5rem;
}

.stat-change {
  font-size: 0.875rem;
  color: var(--success);
}

/* TABS */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  background: var(--surface);
  padding: 0.5rem;
  border-radius: 12px;
  border: 1px solid var(--border);
}

.tab {
  flex: 1;
  padding: 0.875rem;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 0.875rem;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}

.tab.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 12px var(--accent-glow);
}

.tab-content {
  display: none;
  animation: fadeIn 0.4s ease;
}

.tab-content.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 1.5rem;
}

.card-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface-light);
}

.card-title {
  font-family: 'Outfit', sans-serif;
  font-size: 1.125rem;
  font-weight: 700;
}

.refresh-btn {
  padding: 0.5rem 1rem;
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.3);
  border-radius: 8px;
  color: var(--accent);
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover {
  background: rgba(99,102,241,0.2);
  transform: scale(1.05);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 1rem 1.5rem;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  text-align: left;
  background: var(--surface-light);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 1rem 1.5rem;
  font-size: 0.875rem;
  border-bottom: 1px solid var(--border);
}

tr:hover td {
  background: var(--surface-light);
}

.badge {
  display: inline-block;
  padding: 0.375rem 0.75rem;
  border-radius: 6px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}

.badge-order { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.badge-query { background: rgba(99,102,241,0.15); color: var(--accent); border: 1px solid rgba(99,102,241,0.3); }
.badge-outbound { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }

.empty {
  padding: 4rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.875rem;
}

/* CAMPAIGN */
.campaign-form {
  padding: 1.5rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

textarea {
  width: 100%;
  padding: 0.875rem 1rem;
  background: var(--surface-light);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  min-height: 100px;
  resize: vertical;
  transition: border-color 0.2s;
}

textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.btn-primary {
  width: 100%;
  padding: 1rem;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 0.875rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--accent-glow);
}

.result {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 8px;
  font-size: 0.875rem;
  display: none;
}

.result.success {
  background: rgba(16,185,129,0.15);
  border: 1px solid rgba(16,185,129,0.3);
  color: var(--success);
  display: block;
}

.result.error {
  background: rgba(239,68,68,0.15);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--danger);
  display: block;
}
</style>
</head>
<body>
<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="brand">
    <div class="brand-icon">🎯</div>
    <div class="brand-text">
      <h1>Vastram</h1>
      <p>AI-Powered Voice Assistant</p>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    LIVE
  </div>
</div>

<!-- STATS -->
<div class="stats">
  <div class="stat-card" style="--gradient: linear-gradient(90deg, #6366f1, #8b5cf6)">
    <div class="stat-label">Total Calls</div>
    <div class="stat-value" id="total-calls" style="color: var(--accent)">—</div>
    <div class="stat-change">↗ All time</div>
  </div>
  <div class="stat-card" style="--gradient: linear-gradient(90deg, #10b981, #059669)">
    <div class="stat-label">Resolved by AI</div>
    <div class="stat-value" id="bot-resolved" style="color: var(--success)">—</div>
    <div class="stat-change" id="resolution-rate">—</div>
  </div>
  <div class="stat-card" style="--gradient: linear-gradient(90deg, #f59e0b, #d97706)">
    <div class="stat-label">Orders</div>
    <div class="stat-value" id="orders" style="color: var(--warning)">—</div>
    <div class="stat-change">Bulk orders</div>
  </div>
  <div class="stat-card" style="--gradient: linear-gradient(90deg, #8b5cf6, #6366f1)">
    <div class="stat-label">Campaigns Sent</div>
    <div class="stat-value" id="campaigns" style="color: #8b5cf6">—</div>
    <div class="stat-change">Outbound calls</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('orders')">📦 Inbound Orders</button>
  <button class="tab" onclick="switchTab('queries')">💬 Inbound Queries</button>
  <button class="tab" onclick="switchTab('outbound')">📢 Outbound Calls</button>
  <button class="tab" onclick="switchTab('campaign')">🚀 Send Campaign</button>
</div>

<!-- INBOUND ORDERS TAB -->
<div class="tab-content active" id="orders-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Order Requests</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div id="orders-table"></div>
  </div>
</div>

<!-- INBOUND QUERIES TAB -->
<div class="tab-content" id="queries-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Product Queries</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div id="queries-table"></div>
  </div>
</div>

<!-- OUTBOUND CALLS TAB -->
<div class="tab-content" id="outbound-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Outbound Campaign Calls</div>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
    <div id="outbound-table"></div>
  </div>
</div>

<!-- CAMPAIGN TAB -->
<div class="tab-content" id="campaign-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">Launch Campaign</div>
    </div>
    <div class="campaign-form">
      <div class="form-group">
        <label>Campaign Message</label>
        <textarea id="campaign-msg" placeholder="Big sale today! Get 30% off on all sarees and lehengas. Limited time offer!"></textarea>
      </div>
      <button class="btn-primary" onclick="sendCampaign()">🚀 Call All Customers</button>
      <div id="campaign-result" class="result"></div>
    </div>
  </div>
</div>

</div>

<script>
let allLogs = [];

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(tab + '-content').classList.add('active');
}

async function loadData() {
  try {
    const [statsRes, logsRes] = await Promise.all([
      fetch('/api/stats'),
      fetch('/api/logs')
    ]);
    
    const stats = await statsRes.json();
    allLogs = await logsRes.json();
    
    document.getElementById('total-calls').textContent = stats.total_calls;
    document.getElementById('bot-resolved').textContent = stats.bot_resolved;
    document.getElementById('resolution-rate').textContent = `${stats.resolution_rate}% automated`;
    document.getElementById('orders').textContent = stats.high_intent_leads;
    
    const outbound = allLogs.filter(l => l.direction === 'outbound').length;
    document.getElementById('campaigns').textContent = outbound;
    
    renderOrders();
    renderQueries();
    renderOutbound();
  } catch(e) {
    console.error(e);
  }
}

function renderOrders() {
  const orders = allLogs.filter(l => l.direction === 'inbound' && l.intent === 'bulk_order');
  const container = document.getElementById('orders-table');
  
  if (orders.length === 0) {
    container.innerHTML = '<div class="empty">No order requests yet</div>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Customer</th>
          <th>Query</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${orders.map(log => `
          <tr>
            <td>${log.timestamp}</td>
            <td>${maskNumber(log.caller)}</td>
            <td>${log.query || '—'}</td>
            <td><span class="badge badge-order">High Intent</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderQueries() {
  const queries = allLogs.filter(l => l.direction === 'inbound' && l.intent !== 'bulk_order');
  const container = document.getElementById('queries-table');
  
  if (queries.length === 0) {
    container.innerHTML = '<div class="empty">No queries yet</div>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Customer</th>
          <th>Intent</th>
          <th>Query</th>
        </tr>
      </thead>
      <tbody>
        ${queries.slice(0,20).map(log => `
          <tr>
            <td>${log.timestamp}</td>
            <td>${maskNumber(log.caller)}</td>
            <td><span class="badge badge-query">${log.intent.replace('_', ' ')}</span></td>
            <td>${log.query || '—'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function renderOutbound() {
  const outbound = allLogs.filter(l => l.direction === 'outbound');
  const container = document.getElementById('outbound-table');
  
  if (outbound.length === 0) {
    container.innerHTML = '<div class="empty">No outbound calls yet</div>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Time</th>
          <th>Customer</th>
          <th>Campaign</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        ${outbound.map(log => `
          <tr>
            <td>${log.timestamp}</td>
            <td>${maskNumber(log.caller)}</td>
            <td>${log.query || 'Campaign message'}</td>
            <td><span class="badge badge-outbound">Sent</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function maskNumber(num) {
  if (!num || num === 'Unknown') return 'Unknown';
  return num.slice(0, -4).replace(/\d/g,'*') + num.slice(-4);
}

async function sendCampaign() {
  const message = document.getElementById('campaign-msg').value.trim();
  const result = document.getElementById('campaign-result');
  
  if (!message) {
    result.className = 'result error';
    result.textContent = '⚠ Please enter a campaign message';
    return;
  }
  
  try {
    const res = await fetch('/api/trigger_campaign', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message})
    });
    const data = await res.json();
    
    result.className = 'result success';
    result.textContent = `✓ Campaign started! Calling ${data.total} customers...`;
    setTimeout(loadData, 3000);
  } catch(e) {
    result.className = 'result error';
    result.textContent = `✗ Error: ${e.message}`;
  }
}

loadData();
setInterval(loadData, 15000);
</script>
</body>
</html>
